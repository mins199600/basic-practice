<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/boardEdit.css">
</head>
<body>
    <div class="edit-container">
        <h2 class="page-title">게시글 수정</h2>

        <form th:action="@{/board/edit/{id}(id=${board.id})}" method="post" class="edit-form">

            <!-- 카테고리 선택 -->
            <div class="form-group category-group">
                <label for="category">카테고리</label>
                <select name="category" id="category" class="form-control">
                    <option value="일반" th:selected="${board.category == '일반'}">일반</option>
                    <option value="문의" th:selected="${board.category == '문의'}">문의</option>
                    <option value="정보" th:selected="${board.category == '정보'}">정보</option>
                </select>
            </div>

            <!-- 제목 입력 -->
            <div class="form-group title-group">
                <label for="title">제목</label>
                <input type="text" name="title" id="title"
                       class="form-control"
                       th:value="${board.title}"
                       placeholder="제목을 입력하세요" required>
            </div>

            <!-- 내용 입력 -->
            <div class="form-group content-group">
                <label for="content">내용</label>
                <textarea name="content" id="content"
                          class="form-control"
                          rows="10"
                          th:text="${board.content}"
                          placeholder="내용을 입력하세요" required></textarea>
            </div>

            <!-- 버튼 영역 -->
            <div class="button-group">
                <button type="submit" class="btn-submit">수정 완료</button>
                <a th:href="@{/board/{id}(id=${board.id})}" class="btn-cancel">취소</a>
            </div>

        </form>
    </div>
</body>
</html>
