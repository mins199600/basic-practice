<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${board.title}">게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/css/detail.css">
</head>
<body>

<div class="detail-container">

    <!-- 게시글 헤더 -->
    <div class="detail-header">
        <div class="category-badge" th:text="${board.category}">일반</div>
        <h2 class="detail-title" th:text="${board.title}">게시글 제목</h2>
    </div>

    <!-- 게시글 정보 -->
    <div class="detail-info">
        <div class="info-item">
            <span class="info-label">작성자:</span>
            <span class="info-value" th:text="${board.nickName}">닉네임</span>
        </div>
        <div class="info-item">
            <span class="info-label">작성일:</span>
            <span class="info-value" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-16 13:00</span>
        </div>
        <div class="info-item">
            <span class="info-label">조회수:</span>
            <span class="info-value" th:text="${board.viewCount}">0</span>
        </div>
    </div>

    <!-- 게시글 내용 -->
    <div class="detail-content">
        <div th:text="${board.content}">게시글 내용이 여기에 표시됩니다.</div>
    </div>

    <!-- 버튼 영역 -->
    <div class="detail-buttons">
        <a th:href="@{/home}" class="btn-list">목록</a>
        <div th:if="${isAuthor}" class="author-buttons">
            <a th:href="@{/board/edit/{id}(id=${board.id})}" class="btn-edit">수정</a>
            <form th:action="@{/board/delete/{id}(id=${board.id})}"
                  method="post"
                  onsubmit="return confirm('삭제하시겠습니까?');">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
        </div>
    </div>

    <!-- ===== 댓글 영역 ===== -->
    <div class="comment-section">
        <h4>댓글</h4>

        <!-- 댓글 목록 -->
        <div th:each="comment : ${commentList}" class="comment-item">

            <!-- 댓글 내용 -->
            <div class="comment-box">
                <span class="comment-nick" th:text="${comment.nickName}">닉네임</span>
                <span class="comment-content" th:text="${comment.content}">댓글 내용</span>
                <span class="comment-date" th:text="${comment.createdAt}">날짜</span>

                <div class="comment-actions">

                    <!-- 댓글 삭제 -->
                    <form th:action="@{/comment/delete}" method="post"
                          th:if="${comment.memberId.toString() == loginMemberId.toString() or isAuthor or isAdmin}"
                          onsubmit="return confirm('댓글을 삭제하시겠습니까?');">
                        <input type="hidden" name="id" th:value="${comment.id}">
                        <input type="hidden" name="boardId" th:value="${board.id}">
                        <button type="submit" class="btn-comment-delete">삭제</button>
                    </form>

                    <!-- 답글: 모두 -->
                    <button type="button" class="btn-reply"
                            th:onclick="'toggleReply(' + ${comment.id} + ')'">
                        답글
                    </button>

                </div>
            </div>

            <!-- 댓글 수정 폼 (기본 숨김) -->
            <div th:id="'edit-form-' + ${comment.id}" class="edit-form-wrap">
                <form th:action="@{/comment/update}" method="post">
                    <input type="hidden" name="id" th:value="${comment.id}">
                    <input type="hidden" name="boardId" th:value="${board.id}">
                    <input type="text" name="content" th:value="${comment.content}">
                    <button type="submit" class="btn-comment-submit">저장</button>
                    <button type="button" class="btn-cancel"
                            th:onclick="'toggleEdit(' + ${comment.id} + ')'">취소</button>
                </form>
            </div>

            <!-- 대댓글 작성 폼 (기본 숨김) -->
            <div th:id="'reply-form-' + ${comment.id}" class="reply-form-wrap">
                <form th:action="@{/comment/reply}" method="post">
                    <input type="hidden" name="boardId" th:value="${board.id}">
                    <input type="hidden" name="parentId" th:value="${comment.id}">
                    <input type="text" name="content" placeholder="대댓글을 입력하세요">
                    <button type="submit">등록</button>
                </form>
            </div>

            <!-- 대댓글 목록 -->
            <div th:each="reply : ${comment.children}" class="reply-item">
                <span class="reply-arrow">↳</span>
                <span class="comment-nick" th:text="${reply.nickName}">닉네임</span>
                <span class="comment-content" th:text="${reply.content}">대댓글 내용</span>
                <span class="comment-date" th:text="${reply.createdAt}">날짜</span>

                <div class="comment-actions">

                    <!-- 수정: 본인 or 관리자 -->
                    <button type="button" class="edit-comment-btn"
                            th:if="${reply.memberId.toString() == loginMemberId.toString() or isAdmin}"
                            th:onclick="'toggleEdit(' + ${reply.id} + ')'">
                        수정
                    </button>

                    <!-- 대댓글 삭제 -->
                    <form th:action="@{/comment/delete}" method="post"
                          th:if="${reply.memberId.toString() == loginMemberId.toString() or isAuthor or isAdmin}"
                          onsubmit="return confirm('댓글을 삭제하시겠습니까?');">
                        <input type="hidden" name="id" th:value="${reply.id}">
                        <input type="hidden" name="boardId" th:value="${board.id}">
                        <button type="submit" class="btn-comment-delete">삭제</button>
                    </form>

                </div>

                <!-- 대댓글 수정 폼 (기본 숨김) -->
                <div th:id="'edit-form-' + ${reply.id}" class="edit-form-wrap">
                    <form th:action="@{/comment/update}" method="post">
                        <input type="hidden" name="id" th:value="${reply.id}">
                        <input type="hidden" name="boardId" th:value="${board.id}">
                        <input type="text" name="content" th:value="${reply.content}">
                        <button type="submit" class="btn-comment-submit">저장</button>
                        <button type="button" class="btn-cancel"
                                th:onclick="'toggleEdit(' + ${reply.id} + ')'">취소</button>
                    </form>
                </div>

            </div>

        </div>

        <!-- 댓글 작성 폼 -->
        <div class="comment-write">
            <form th:action="@{/comment/write}" method="post">
                <input type="hidden" name="boardId" th:value="${board.id}">
                <input type="text" name="content" placeholder="댓글을 입력하세요" class="comment-input">
                <button type="submit" class="btn-comment-submit">등록</button>
            </form>
        </div>
    </div>

</div>

<script src="/js/comment.js"></script>

</body>
</html>
