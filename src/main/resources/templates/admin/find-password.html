<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 찾기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/findAdmin.css">
</head>
<body>

<div class="login-page">
    <div class="login-card">

        <h1 class="login-title">비밀번호 찾기</h1>
        <p class="login-description">가입 시 등록한 이메일과 닉네임을 입력하세요.</p>

        <form class="login-form" action="/admin/find-password" method="post">
            <div class="login-input-group">
                <label class="login-label" for="email">이메일</label>
                <input type="text"
                       id="email"
                       name="email"
                       class="login-input"
                       placeholder="이메일을 입력하세요">
            </div>

            <div class="login-input-group">
                <label class="login-label" for="nickname">닉네임</label>
                <input type="text"
                       id="nickname"
                       name="nickname"
                       class="login-input"
                       placeholder="닉네임을 입력하세요">
            </div>

            <button type="submit" class="login-button">본인 확인</button>
        </form>

        <!-- 에러 -->
        <p class="error-message" th:if="${error}" th:text="${error}"></p>

        <a href="/admin" class="join-button">로그인으로 돌아가기</a>

    </div>
</div>

</body>
</html>
