<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>홈페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/admin-create.css">
</head>
<body>
<div class="admin-join-page">

    <header class="admin-join-header">
        <div class="admin-logo-box">
            <span class="logo-main-text">ADMIN</span>
            <span class="logo-sub-text">JOIN</span>
        </div>
    </header>

    <main class="admin-join-container">

        <section class="join-card">

            <div class="join-card-header">
                <div class="join-icon">🛡️</div>
                <h1 class="join-title">관리자 회원가입</h1>
                <p class="join-sub-title">관리자 계정을 생성합니다.</p>
            </div>

            <form class="join-form" action="/admin/join" method="post">

                <div class="join-form-group">
                    <label for="email" class="join-form-label">이메일</label>
                    <input type="email"
                           id="email"
                           name="email"
                           class="join-form-input"
                           placeholder="관리자 이메일을 입력하세요"
                           required>
                </div>

                <div class="join-form-group">
                    <label for="password" class="join-form-label">비밀번호</label>
                    <input type="password"
                           id="password"
                           name="password"
                           class="join-form-input"
                           placeholder="비밀번호를 입력하세요"
                           required>
                </div>

                <div class="join-form-group">
                    <label for="passwordCheck" class="join-form-label">비밀번호 확인</label>
                    <input type="password"
                           id="passwordCheck"
                           name="passwordCheck"
                           class="join-form-input"
                           placeholder="비밀번호를 한 번 더 입력하세요"
                           required>
                </div>

                <div class="join-form-group">
                    <label for="nickname" class="join-form-label">관리자 이름</label>
                    <input type="text"
                           id="nickname"
                           name="nickname"
                           class="join-form-input"
                           placeholder="관리자 이름 또는 닉네임을 입력하세요">
                </div>

                <!-- role은 사용자가 직접 고르는 게 아니라 hidden으로 ADMIN 고정 -->
                <input type="hidden" name="role" value="ADMIN">

                <div class="join-warning-message">
                    관리자 계정은 회원 관리, 게시글 수정/삭제, 공지사항, 팝업 관리 권한을 가집니다.
                </div>

                <button type="submit" class="btn-join-submit">관리자 가입</button>

            </form>

            <div class="join-link-area">
                <a href="/admin/login" class="join-link-button">이미 계정이 있으신가요? 로그인</a>
            </div>

        </section>

    </main>

    <footer class="admin-join-footer">
        <p>Copyright © Admin Manager. All Rights Reserved.</p>
    </footer>

</div>

</body>
</html>
