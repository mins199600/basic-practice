<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 로그인</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <link rel="stylesheet" type="text/css" href="/css/admin-login.css">
</head>
<body>

<div class="admin-login-page">

    <!-- 상단 로고 영역 -->
    <header class="admin-login-header">
        <div class="admin-logo-box">
            <span class="logo-main-text">ADMIN</span>
            <span class="logo-sub-text">MANAGER</span>
        </div>
    </header>

    <!-- 로그인 중앙 영역 -->
    <main class="admin-login-container">

        <section class="login-card">

            <div class="login-card-header">
                <div class="login-icon">🔐</div>
                <h1 class="login-title">관리자 로그인</h1>
                <p class="login-sub-title">관리자 계정으로 로그인 후 이용해 주세요.</p>
            </div>

            <!-- 에러 메시지 예시 -->
            <!--
            <div class="login-error-message" th:if="${loginError}">
                아이디 또는 비밀번호가 일치하지 않습니다.
            </div>
            -->

            <form class="login-form" action="/admin/login" method="post">

                <div class="login-form-group">
                    <label for="email" class="login-form-label">아이디</label>
                    <input type="text"
                           id="email"
                           name="email"
                           class="login-form-input"
                           placeholder="관리자 아이디를 입력하세요"
                           autocomplete="username">
                </div>

                <div class="login-form-group">
                    <label for="password" class="login-form-label">비밀번호</label>
                    <input type="password"
                           id="password"
                           name="password"
                           class="login-form-input"
                           placeholder="비밀번호를 입력하세요"
                           autocomplete="current-password">
                </div>

                <div class="login-option-row">
                    <label class="remember-login-label">
                        <input type="checkbox" name="rememberId" class="remember-login-checkbox">
                        <span>아이디 저장</span>
                    </label>
                </div>

                <button type="submit" class="btn-login-submit">로그인</button>

            </form>

            <div class="login-link-area">
                <a href="/admin/join" class="login-link-button">회원가입</a>
                <span class="link-divider"></span>
                <a href="/admin/find-id" class="login-link-button">아이디 찾기</a>
                <span class="link-divider"></span>
                <a href="/admin/find-password" class="login-link-button">비밀번호 찾기</a>
            </div>

        </section>

        <!-- 안내 박스 -->
        <aside class="login-guide-box">
            <h2 class="guide-title">관리자 페이지 안내</h2>

            <ul class="guide-list">
                <li>회원 정보 수정 및 탈퇴 처리가 가능합니다.</li>
                <li>게시글 수정, 삭제, 공지사항 고정 관리가 가능합니다.</li>
                <li>팝업 등록 및 노출 기간 설정이 가능합니다.</li>
                <li>비밀번호는 보안상 사용자 본인만 변경할 수 있습니다.</li>
            </ul>
        </aside>

    </main>

    <footer class="admin-login-footer">
        <p>Copyright © Admin Manager. All Rights Reserved.</p>
    </footer>

</div>

</body>
</html>
