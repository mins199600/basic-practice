<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/findAdmin.css">
</head>
<body>

<div class="login-page">
    <div class="login-card">

        <h1 class="login-title">비밀번호 재설정</h1>
        <p class="login-description">새로운 비밀번호를 입력하세요.</p>

        <form class="login-form" action="/admin/reset-password" method="post">

            <!-- 이메일 hidden -->
            <input type="hidden" name="email" th:value="${verifiedEmail}">

            <div class="login-input-group">
                <label class="login-label" for="newPassword">새 비밀번호</label>
                <input type="password"
                       id="newPassword"
                       name="newPassword"
                       class="login-input"
                       placeholder="새 비밀번호를 입력하세요">
            </div>

            <div class="login-input-group">
                <label class="login-label" for="newPasswordCheck">비밀번호 확인</label>
                <input type="password"
                       id="newPasswordCheck"
                       name="newPasswordCheck"
                       class="login-input"
                       placeholder="비밀번호를 다시 입력하세요">
            </div>

            <button type="submit" class="login-button">비밀번호 변경</button>
        </form>

        <!-- 에러 -->
        <p class="error-message" th:if="${error}" th:text="${error}"></p>

    </div>
</div>

</body>
</html>
