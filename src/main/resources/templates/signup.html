<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/signup.css">

</head>
<body th:attr="data-error-message=${errorMessage}">
    <div class="signup-page">
        <div class="signup-card">
            <h1 class="signup-title">회원가입</h1>
            <p class="signup-description">사용할 이메일과 비밀번호를 입력해주세요.</p>

            <form id="signupForm" class="signup-form" method="post" action="/signup">
                <div class="signup-input-group">
                    <label for="email" class="signup-label">이메일</label>
                    <input type="email" id="email" name="email" class="signup-input" placeholder="example@email.com" required>
                </div>

                <div class="signup-input-group">
                    <button type="button" class="signup-submit-button" onclick="sendCode()">인증번호 발송</button>
                </div>

                <div class="signup-input-group">
                    <label for="code" class="signup-label">인증번호</label>
                    <input type="text" id="code" class="signup-input" placeholder="6자리 인증번호 입력">
                </div>

                <div class="signup-input-group">
                    <button type="button" class="signup-submit-button" onclick="verifyCode()">인증번호 확인</button>
                </div>

                <div class="signup-input-group">
                    <label for="password" class="signup-label">비밀번호</label>

                    <input type="password" id="password" name="password" class="signup-input" placeholder="비밀번호 입력" required>
                </div>

                <div class="signup-input-group">
                    <label for="nickName" class="signup-label">닉네임 (선택)</label>
                    <input type="text" id="nickName" name="nickName" class="signup-input" placeholder="닉네임을 입력하세요">
                </div>

                <button type="submit" class="signup-submit-button">회원가입 완료</button>

                <a href="/" class="signup-login-button">로그인 페이지 이동</a>
            </form>
        </div>
    </div>

    <script src="/js/signup.js"></script>

</body>
</html>
