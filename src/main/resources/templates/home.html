<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 성공</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/home.css">
</head>

<body>

<div class="container">

    <div class="login-card">

        <div class="profile-area">
            <div class="profile-image">👤</div>
            <div>
                <div class="nickname-text">
                    <span id="nickname">사용자</span>님 안녕하세요.
                </div>

                <div class="email-text" id="email">
                    이메일 정보를 불러오는 중입니다.
                </div>
            </div>
        </div>

        <div class="button-area">
            <a th:href="@{/edit}" class="edit-button">수정</a>
            <button type="button" class="logout-button" onclick="logout()">로그아웃</button>
        </div>

    </div>

</div>

<script>
    // 로그인한 사용자 정보 가져오기
    fetch('/api/user-info')
        .then(response => response.json())
        .then(data => {
            console.log('사용자 정보:', data);

            const nickname = data.nickname || data.name || data.username || '사용자';
            const email = data.email || '이메일 정보 없음';

            document.getElementById('nickname').textContent = nickname;
            document.getElementById('email').textContent = email;
        })
        .catch(error => {
            console.error('사용자 정보 불러오기 실패:', error);

            document.getElementById('nickname').textContent = '사용자';
            document.getElementById('email').textContent = '이메일 정보를 불러오지 못했습니다.';
        });

    // 로그아웃 함수
    function logout() {
        if (confirm('정말 로그아웃 하시겠습니까?')) {
            window.location.href = '/logout';
        }
    }
</script>

</body>
</html>
