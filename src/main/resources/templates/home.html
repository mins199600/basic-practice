<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 성공</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/home.css">
</head>

<body>
    <!-- 사용자 카드 -->
    <div class="container">
        <div class="login-card">
            <div class="profile-area">
                <div class="profile-image">👤</div>
                <div>

                    <div class="nickname-text">
                        <span id="nickname">사용자</span>님 안녕하세요.
                    </div>

                    <div class="email-text" id="email">
                        이메일 정보를 불러오는 중입니다.
                    </div>
                </div>
            </div>

            <div class="button-area">
                <a th:href="@{/edit}" class="edit-button">수정</a>
                <button type="button" class="logout-button" onclick="logout()">로그아웃</button>
            </div>
        </div>
    </div>

    <!--board 전체 조회 내용-->
    <div class="board-container">
        <div class="board-header">
            <h2>게시판</h2>
            <a th:href="@{/board/create}" class="write-button">글쓰기</a>
        </div>

        <!-- 게시글이 없을 때 -->
        <div th:if="${boardList == null or #lists.isEmpty(boardList)}" class="empty-board">
            등록된 게시글이 없습니다.
        </div>

        <!-- 게시글 목록 -->
        <table th:if="${boardList != null and !#lists.isEmpty(boardList)}" class="board-table">
            <thead>
            <tr>
                <th>번호</th>
                <th>카테고리</th>
                <th>제목</th>
                <th>작성자</th>
                <th>조회수</th>
                <th>작성일</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="board : ${boardList}">
                <td th:text="${board.id}">1</td>

                <td th:text="${board.category}">일반</td>

                <td class="title-cell">
                    <a th:href="@{/board/view/{id}(id=${board.id})}"
                       th:text="${board.title}">
                        게시글 제목
                    </a>
                </td>

                <td th:text="${board.nickName}">작성자</td>

                <td th:text="${board.viewCount}">0</td>

                <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">
                    2026-05-16 13:00
                </td>
            </tr>
            </tbody>
        </table>
    </div>


<script src="/js/board.js"></script>

</body>
</html>
